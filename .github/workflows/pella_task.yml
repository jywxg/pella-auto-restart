name: Pella UI Automation

on:
  repository_dispatch:
    types: [pella_trigger]
  workflow_dispatch:

jobs:
  pella-click:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # --- 关键修改部分开始 ---
      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium
      # --- 关键修改部分结束 ---

      - name: Run Script
        env:
          ACCOUNT_JSON: ${{ secrets.ACCOUNT_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
