name: Pella Browser Automation

on:
  repository_dispatch:
    types: [pella_trigger]
  workflow_dispatch: # 方便你在 GitHub 手动点击测试

jobs:
  browser-click:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Pella Automation
        env:
          # 在 GitHub Secrets 中设置这些变量
          ACCOUNT_JSON: ${{ secrets.ACCOUNT_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py
